<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <title>Privy — Private Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Light Mode */
:root {
  --bg-primary: #f8fafc;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f1f5f9;
  --surface-glass: rgba(255,255,255,0.92);
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --accent: #4f46e5;
  --accent-light: #eef2ff;
  --accent-dark: #4338ca;
  --accent-glow: rgba(79,70,229,0.15);
  --success: #10b981;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 30px rgba(0,0,0,0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Dark Mode */
body.dark {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #0f172a;
  --surface-glass: rgba(30,41,59,0.92);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border: #334155;
  --accent: #818cf8;
  --accent-light: #312e81;
  --shadow-lg: 0 12px 30px rgba(0,0,0,0.3);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: var(--transition);
  height: 100vh;
  overflow: hidden;
}

.screen {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.3s ease;
}
.screen.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

/* Pairing Card */
.pairing-card {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  padding: 48px 40px;
  width: 100%;
  max-width: 460px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  transition: var(--transition);
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}
.logo-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin: 0 auto 16px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.logo h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.logo p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 6px;
}

.btn-group { display: flex; gap: 12px; margin: 28px 0; }
.btn {
  flex: 1;
  padding: 14px 20px;
  border: none;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: white;
  box-shadow: 0 2px 8px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); filter: brightness(1.02); }
.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); transform: translateY(-2px); }

.code-box {
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  padding: 28px;
  text-align: center;
  margin: 20px 0;
  border: 1px solid var(--border);
}
.code-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 12px;
}
.code {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 12px;
  font-family: monospace;
  color: var(--accent);
}

input {
  width: 100%;
  padding: 14px 18px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 40px;
  font-size: 15px;
  color: var(--text-primary);
  font-family: inherit;
  transition: var(--transition);
}
input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* Chat Layout */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: var(--bg-primary);
}

.chat-header {
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: var(--surface-glass);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 10;
}

.partner-info { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  animation: subtleGlow 3s infinite;
}
@keyframes subtleGlow {
  0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 0 4px var(--accent-glow); }
}
.partner-name { font-weight: 700; font-size: 17px; }
.status { font-size: 12px; color: var(--success); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.icon-btn {
  background: var(--bg-tertiary);
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  transition: var(--transition);
  color: var(--text-secondary);
}
.icon-btn:hover { background: var(--border); transform: scale(1.05); }

.conn-status {
  text-align: center;
  padding: 8px;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
}

.messages-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.message {
  max-width: 75%;
  padding: 12px 18px;
  border-radius: 22px;
  font-size: 14px;
  line-height: 1.45;
  word-break: break-word;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.mine {
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 6px;
}
.message.theirs {
  background: var(--bg-secondary);
  color: var(--text-primary);
  align-self: flex-start;
  border-bottom-left-radius: 6px;
  border: 1px solid var(--border);
}
.message-time {
  font-size: 10px;
  margin-top: 6px;
  opacity: 0.6;
}
.message.mine .message-time { text-align: right; }

/* Typing Indicator */
.typing-indicator {
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.2s;
}
.typing-indicator.visible { opacity: 1; }
.typing-dots { display: flex; gap: 5px; }
.typing-dots span {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: wave 1.2s infinite;
}
.typing-dots span:nth-child(1) { animation-delay: 0s; }
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes wave {
  0%,60%,100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-6px); opacity: 1; }
}
.typing-text { font-size: 12px; color: var(--text-muted); }

.input-area {
  padding: 16px 20px;
  background: var(--surface-glass);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}
.input-area input {
  flex: 1;
  margin: 0;
  padding: 14px 20px;
}
.send-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a855f7);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 18px;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.send-btn:hover { transform: scale(1.05) rotate(5deg); }

.empty-state {
  text-align: center;
  color: var(--text-muted);
  padding: 60px 20px;
}

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text-primary);
  color: var(--bg-primary);
  padding: 10px 20px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: 0.2s;
  pointer-events: none;
  z-index: 1000;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

@media (max-width: 600px) {
  .pairing-card { padding: 32px 24px; margin: 16px; }
  .message { max-width: 85%; }
  .code { font-size: 26px; letter-spacing: 6px; }
  .logo-icon { width: 52px; height: 52px; font-size: 24px; }
  .btn-group { flex-direction: column; }
}

/* Custom icon styles */
.custom-icon {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.logo-icon.custom-icon {
  background-image: url('icons/icon-192.png');
}

.avatar.custom-icon {
  background-image: url('icons/icon-96.png');
}
  </style>
</head>
<body>

<!-- PAIRING SCREEN -->
<div id="pairing-screen" class="screen">
  <div class="pairing-card">
    <div class="logo">
      <div class="logo-icon custom-icon"></div>
      <h1>privy</h1>
      <p>private · encrypted · one-to-one</p>
    </div>

    <div class="btn-group">
      <button id="create-btn" class="btn btn-primary">Create Room</button>
      <button id="join-btn" class="btn btn-secondary">Join Room</button>
    </div>

    <div id="create-section" style="display: none;">
      <div class="code-box">
        <div class="code-label">Your pairing code</div>
        <div class="code" id="pairing-code">------</div>
      </div>
      <p style="font-size: 12px; text-align: center; color: var(--text-secondary);">Share this code with your friend</p>
    </div>

    <div id="join-section" style="display: none;">
      <input type="text" id="join-code-input" placeholder="Enter 6-digit code" maxlength="6" style="text-align: center; font-size: 26px; letter-spacing: 8px;">
      <button id="confirm-join-btn" class="btn btn-primary" style="width: 100%;">Connect</button>
    </div>

    <div style="text-align: center; margin-top: 24px;">
      <button id="theme-btn" class="icon-btn" style="width: auto; padding: 8px 20px; border-radius: 40px;">🌓 Theme</button>
    </div>
  </div>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen" class="screen hidden" style="padding: 0;">
  <div class="chat-container">
    <div class="chat-header">
      <div class="partner-info">
        <div class="avatar custom-icon"></div>
        <div>
          <div class="partner-name">Privy</div>
          <div class="status"><span class="status-dot"></span> Connected</div>
        </div>
      </div>
      <button id="leave-chat-btn" class="icon-btn">✕</button>
    </div>

    <div class="conn-status">🔒 End-to-end encrypted</div>

    <div class="messages-area" id="messages-area">
      <div class="empty-state" id="empty-state">💬 No messages yet</div>
    </div>

    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <span class="typing-text">Typing...</span>
    </div>

    <div class="input-area">
      <input type="text" id="message-input" placeholder="Aa" autocomplete="off">
      <button class="send-btn" id="send-btn">↑</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="firebase-config.js"></script>
<script>
// ============================================================
// PRIVY — Modern Creative UI
// ============================================================

let currentRoom = null;
let isHost = false;
let unsubscribeMessages = null;
let localMessageIds = new Set();
let typingTimeout = null;

const pairingScreen = document.getElementById('pairing-screen');
const chatScreen = document.getElementById('chat-screen');
const createBtn = document.getElementById('create-btn');
const joinBtn = document.getElementById('join-btn');
const createSection = document.getElementById('create-section');
const joinSection = document.getElementById('join-section');
const pairingCodeEl = document.getElementById('pairing-code');
const joinCodeInput = document.getElementById('join-code-input');
const confirmJoinBtn = document.getElementById('confirm-join-btn');
const leaveChatBtn = document.getElementById('leave-chat-btn');
const messageInput = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');
const messagesArea = document.getElementById('messages-area');
const emptyState = document.getElementById('empty-state');
const toastEl = document.getElementById('toast');
const themeBtn = document.getElementById('theme-btn');
const typingIndicator = document.getElementById('typing-indicator');

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2000);
}

function generateCode() {
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function addMessage(text, isMine, time = null, messageId = null) {
  if (messageId && localMessageIds.has(messageId)) return;
  if (messageId) localMessageIds.add(messageId);
  
  if (!time) time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (emptyState) emptyState.style.display = 'none';
  
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${isMine ? 'mine' : 'theirs'}`;
  msgDiv.innerHTML = `${escapeHtml(text)}<div class="message-time">${time}</div>`;
  messagesArea.appendChild(msgDiv);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showTyping(show) {
  if (show) typingIndicator.classList.add('visible');
  else typingIndicator.classList.remove('visible');
}

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

createBtn.addEventListener('click', async () => {
  currentRoom = generateCode();
  isHost = true;
  pairingCodeEl.textContent = currentRoom;
  createSection.style.display = 'block';
  joinSection.style.display = 'none';
  showToast(`Your code: ${currentRoom}`);
  
  await db.collection('rooms').doc(currentRoom).set({ host: true, createdAt: Date.now(), active: true });
  
  const unsub = db.collection('rooms').doc(currentRoom).onSnapshot((doc) => {
    if (doc.exists && doc.data().peerJoined) {
      showToast('Friend connected!');
      startChat();
      unsub();
    }
  });
});

confirmJoinBtn.addEventListener('click', async () => {
  const code = joinCodeInput.value.trim();
  if (!code || code.length !== 6) { showToast('Enter 6-digit code'); return; }
  
  const docRef = db.collection('rooms').doc(code);
  const doc = await docRef.get();
  
  if (!doc.exists) { showToast('Invalid code'); return; }
  
  const oneHourAgo = Date.now() - 60 * 60 * 1000;
  if (doc.data().createdAt < oneHourAgo) {
    showToast('Code expired');
    await docRef.delete();
    return;
  }
  
  currentRoom = code;
  isHost = false;
  await docRef.update({ peerJoined: true, joinedAt: Date.now() });
  showToast('Connected!');
  startChat();
});

function startChat() {
  pairingScreen.classList.add('hidden');
  chatScreen.classList.remove('hidden');
  localMessageIds.clear();
  loadMessages();
  
  if (unsubscribeMessages) unsubscribeMessages();
  
  unsubscribeMessages = db.collection('rooms').doc(currentRoom).collection('messages')
    .orderBy('timestamp')
    .onSnapshot((snapshot) => {
      snapshot.docChanges().forEach((change) => {
        if (change.type === 'added') {
          const data = change.doc.data();
          const isMine = (isHost && data.from === 'host') || (!isHost && data.from === 'peer');
          addMessage(data.text, isMine, data.time, change.doc.id);
        }
      });
    });
  
  const typingRef = db.collection('rooms').doc(currentRoom).collection('typing').doc('status');
  typingRef.onSnapshot((doc) => {
    if (doc.exists && doc.data().typing) {
      const isFromPeer = (isHost && doc.data().from === 'peer') || (!isHost && doc.data().from === 'host');
      if (isFromPeer) showTyping(true);
      else showTyping(false);
    } else { showTyping(false); }
  });
}

async function sendMessage(text) {
  if (!currentRoom) return;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  await db.collection('rooms').doc(currentRoom).collection('messages').add({
    text, from: isHost ? 'host' : 'peer', timestamp: Date.now(), time
  });
}

async function loadMessages() {
  if (!currentRoom) return;
  const snapshot = await db.collection('rooms').doc(currentRoom).collection('messages').orderBy('timestamp').get();
  if (emptyState && snapshot.empty) return;
  if (emptyState) emptyState.style.display = 'none';
  snapshot.forEach((doc) => {
    const data = doc.data();
    const isMine = (isHost && data.from === 'host') || (!isHost && data.from === 'peer');
    addMessage(data.text, isMine, data.time, doc.id);
  });
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

messageInput.addEventListener('input', () => {
  if (!currentRoom) return;
  const typingRef = db.collection('rooms').doc(currentRoom).collection('typing').doc('status');
  typingRef.set({ typing: true, from: isHost ? 'host' : 'peer', timestamp: Date.now() });
  if (typingTimeout) clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    typingRef.set({ typing: false, from: isHost ? 'host' : 'peer', timestamp: Date.now() });
  }, 1000);
});

sendBtn.addEventListener('click', () => {
  const text = messageInput.value.trim();
  if (!text) return;
  sendMessage(text);
  messageInput.value = '';
  const typingRef = db.collection('rooms').doc(currentRoom).collection('typing').doc('status');
  typingRef.set({ typing: false, from: isHost ? 'host' : 'peer', timestamp: Date.now() });
});

messageInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendBtn.click();
});

leaveChatBtn.addEventListener('click', () => {
  if (unsubscribeMessages) unsubscribeMessages();
  currentRoom = null;
  localMessageIds.clear();
  messagesArea.innerHTML = '<div class="empty-state" id="empty-state">💬 No messages yet</div>';
  pairingScreen.classList.remove('hidden');
  chatScreen.classList.add('hidden');
  createSection.style.display = 'none';
  joinSection.style.display = 'none';
  joinCodeInput.value = '';
  showToast('Left the chat');
});

let isDarkMode = localStorage.getItem('privy_theme') === 'dark';
if (isDarkMode) document.body.classList.add('dark');
themeBtn.addEventListener('click', () => {
  isDarkMode = !isDarkMode;
  if (isDarkMode) {
    document.body.classList.add('dark');
    localStorage.setItem('privy_theme', 'dark');
    themeBtn.textContent = '☀️ Light';
  } else {
    document.body.classList.remove('dark');
    localStorage.setItem('privy_theme', 'light');
    themeBtn.textContent = '🌓 Dark';
  }
});
themeBtn.textContent = isDarkMode ? '☀️ Light' : '🌓 Dark';

joinBtn.addEventListener('click', () => {
  createSection.style.display = 'none';
  joinSection.style.display = 'block';
});

console.log('Privy ready — Creative UI');
</script>
</body>
</html>
